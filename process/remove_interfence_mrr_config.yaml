# MRR interference filtering configuration.
#
# Site-specific processing notes:
# - lagonero: keeps the lowest-connected-component cleanup enabled. This
#   preserves the existing Lagonero setup for cable-car interference removal.
# - collalbo: protects profiles whose echo reaches the highest range gate
#   and extends downward by at least 1000 m. It also disables upper-
#   interference masking and lowest-connected-component cleanup to avoid
#   over-chopping rooted, vertically gappy rain profiles.
#
# Config for TEAMx campaign
campaign:
  site: "collalbo" # "lagonero" # or "collalbo"
  start_date: "20250630"
  end_date: "20250630"
  start_datetime: "2025-06-30T00:00:00"
  end_datetime: "2025-06-30T23:59:59"

processing:
  remove_interference: true
  calculate_uncertainty: false
  final_time_average: "5min"
  make_plots: true

output:
  output_dir: "/data/campaigns/teamx/{site}/mrr/l2"
  overwrite: true # overwrite existing files in output_dir
  compression_level: 9


# Use {site_selected} in path_mrr_template to derive the MRR input path.
sites: 
  collalbo:
    path_mrr_template: "/data/campaigns/teamx/collalbo/mrr/l1/"
    interference_windows:
      start: "00:00:00"
      end: "23:59:59"
    filtering:
      filter_RR_on: true
      min_interference_extent_factor: 1.0
      min_interference_layer_fraction: 0.95
      interference_min_lowest_echo_height: 1500.0
      min_interference_time_profiles: 2
      min_lower_echo_time_profiles: 2
      min_elevated_connected_gates: 4
      min_lower_echo_connected_gates: 4
      max_interference_missing_gates: 0
      max_rain_column_missing_gates: 3
      protect_top_rooted_profiles: true
      top_rooted_min_vertical_extent: 800.0
      keep_lowest_connected_component: false
      apply_upper_interference_masking: false
      lower_echo_height_limit: 1500.0
      min_lower_echo_peak_ze: -5.0
      min_lower_continuous_ze_gates: 8
    rain_flag_config:
      use_mwr_rain_flag: true
      allow_missing_mwr_rain_flag: true
      min_rain_column_height: 1500.0
      min_rain_column_ze: -5.0
      min_rain_column_connected_gates: 4
      max_rain_column_missing_gates: 0
      mwr_reindex_tolerance: "2min"
      rain_extension: "3min"
  lagonero:
      path_mrr_template: "/data/campaigns/teamx/lagonero/mrr/l1/"
      interference_windows:
        start: "06:30:00"
        end: "16:00:00"
      filtering:
        filter_RR_on: true
        min_interference_extent_factor: 1.0
        min_interference_layer_fraction: 0.95
        interference_min_lowest_echo_height: 1500.0
        min_interference_time_profiles: 2
        min_lower_echo_time_profiles: 2
        min_elevated_connected_gates: 4
        min_lower_echo_connected_gates: 4
        max_interference_missing_gates: 0
        max_rain_column_missing_gates: 0
        keep_lowest_connected_component: true
        apply_upper_interference_masking: true
        lower_echo_height_limit: 1500.0
        min_lower_echo_peak_ze: -5.0
        min_lower_continuous_ze_gates: 4
      rain_flag_config:
        use_mwr_rain_flag: true
        allow_missing_mwr_rain_flag: true
        min_rain_column_height: 1500.0
        min_rain_column_ze: -5.0
        min_rain_column_connected_gates: 4
        max_rain_column_missing_gates: 0
        protect_top_rooted_profiles: false
        top_rooted_min_vertical_extent: 1000.0
        mwr_reindex_tolerance: "2min"
        rain_extension: "3min"


